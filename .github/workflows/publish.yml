name: Publish image

on:
  workflow_dispatch:
  push:
    tags:
      - "submission-*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push linux/amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/track2-captioner:latest
            ghcr.io/${{ github.repository_owner }}/track2-captioner:${{ github.ref_name }}
          build-args: |
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            FIREWORKS_API_KEY=${{ secrets.FIREWORKS_API_KEY }}
      - name: Report image size
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/track2-captioner:latest | head -20
